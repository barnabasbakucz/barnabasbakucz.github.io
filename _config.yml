# ==============================================================
# SITE SETTINGS — edit everything in this file to personalise
# ==============================================================

title                  : "Barnabás Bakucz"
description            : "PhD Candidate in Economics"
url                    : "https://barnabasbakucz.github.io"
baseurl                : ""

# --- Author / Profile -----------------------------------------------------------
author:
  name        : "Barnabás Bakucz"
  avatar      : "/images/profile_pic.jpg"          # add your photo here
  bio         : >
    Ph.D. Candidate in Economics.
  location    : "Bergen, Norway"
  employer    : "FAIR, Norwegian School of Economics"

# --- Navigation -----------------------------------------------------------------
# Controls the top nav bar. Each entry maps to a file in _pages/
navigation:
  - title: "Research"
    url: /research/
  - title: "Teaching"
    url: /teaching/
  - title: "CV"
    url: /cv/

# --- Build settings (don't change unless you know what you're doing) ------------
remote_theme           : "academicpages/academicpages.github.io"
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-remote-theme

markdown               : kramdown
highlighter            : rouge
encoding               : utf-8

kramdown:
  input          : GFM
  auto_ids       : true
  hard_wrap      : false
  toc_levels     : 1..6

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
