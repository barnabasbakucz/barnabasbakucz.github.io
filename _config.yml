# ==============================================================
# SITE SETTINGS — edit everything in this file to personalise
# ==============================================================

title                  : "Barnabás Bakucz"
description            : "PhD Candidate in Economics at University Name"
url                    : "https://barnabasbakucz.github.io"
baseurl                : ""

# --- Author / Profile -----------------------------------------------------------
author:
  name        : "Your Full Name"
  avatar      : "/images/profile.jpg"          # add your photo here
  bio         : >
    I am a PhD Candidate in Economics at University Name.
    My research focuses on political and behavioral economics,
    with particular interests in [your topics].
    I am on the job market in [year].
  location    : "City, Country"
  employer    : "University Name"

  # Social links — leave blank ("") to hide
  email       : "yourname@university.edu"
  github      : "yourgithubusername"
  googlescholar: "https://scholar.google.com/citations?user=YOURID"
  twitter     : ""
  linkedin    : ""

# --- Navigation -----------------------------------------------------------------
# Controls the top nav bar. Each entry maps to a file in _pages/
navigation:
  - title: "About"
    url: /about/
  - title: "Research"
    url: /research/
  - title: "Teaching"
    url: /teaching/
  - title: "CV"
    url: /cv/

# --- Build settings (don't change unless you know what you're doing) ------------
remote_theme           : "academicpages/academicpages.github.io"
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-remote-theme

markdown               : kramdown
highlighter            : rouge
encoding               : utf-8

kramdown:
  input          : GFM
  auto_ids       : true
  hard_wrap      : false
  toc_levels     : 1..6

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
